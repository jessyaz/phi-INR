defaults:
  - _self_

meta:
  experiment_pack: "TEST_1203"

# ── Données ──────────────────────────────────────────────────
data:
  dataset_name: NZ
  train_parquet: "data/train_data.parquet"
  test_parquet:  "data/test_data.parquet"
  num_days: "10D"
  look_back_window: 192
  horizon: 48
  input_dim: 1
  output_dim: 1
  x_dyn_c_dim: 11
  x_stat_dim: 1
  num_workers: 4
  pin_memory: true

# ── Optimisation ─────────────────────────────────────────────
optim:
  epochs: 250
  batch_size: 32
  lr_inr: 1.0e-4
  lr_code: 1.0e-4
  weight_decay: 1.0e-5
  clip_grad_value: 1.0
  scheduler: cosine
  t_max: 3000

# ── Inner loop ───────────────────────────────────────────────
inner:
  inner_steps: 200
  w_passed: 0.2
  w_futur: 0.8

# ── VAE ──────────────────────────────────────────────────────
vae:
  beta_start: 0.0
  beta_end: 1.0e-4
  beta_warmup_epochs: 200
  lambda_vae: 0.1

# ── Pré-entraînement VAE ─────────────────────────────────────
pretrain_vae:
  epochs: 200
  lr: 1.0e-3
  beta_warmup_epochs: 50
  patience: 100
  early_stop_threshold: 1.0e-5

# ── INR ──────────────────────────────────────────────────────
inr:
  hidden_dim: 256
  depth: 3
  latent_dim: 128
  static_emb_dim: 16
  num_frequencies: 8
  min_frequencies: 0
  base_frequency: 1.25
  include_input: true
  use_context: true

# ── Chemins ──────────────────────────────────────────────────
paths:
  save_models:  "save_models"
  scalers_file: "save_models/scalers.pkl"

# ── Divers ───────────────────────────────────────────────────
misc:
  version: 2
  log_every_n_epochs: 10
  save_every_n_epochs: 1
  n_plots: 5